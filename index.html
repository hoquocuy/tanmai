<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tân Mai Digital IOC - Trung Tâm Điều Hành Tổng Lực</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f1a; color: #f1f5f9; overflow-x: hidden; }
        
        .glass-card { background: rgba(22, 30, 46, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .stat-card { transition: all 0.3s ease; border-radius: 24px; cursor: pointer; border-bottom: 4px solid transparent; }
        .stat-card:hover { transform: translateY(-5px); background: #161e2e; }
        .stat-card.active { border-color: #ffffff !important; background: rgba(59, 130, 246, 0.1); }
        
        .status-pill { padding: 4px 12px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; display: inline-block; }
        
        select, input { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 12px; padding: 10px 16px; outline: none; }
        thead th { background: #161e2e; color: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; padding: 20px; position: sticky; top: 0; z-index: 10; }
        .text-content { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <!-- Header & Bảng Giám Sát Cập Nhật -->
    <div class="max-w-[1750px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 mb-8">
        <!-- Logo & Đồng hồ -->
        <header class="lg:col-span-4 glass-card p-6 flex items-center space-x-5 border-l-4 border-l-blue-600">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg"><i class="fa-solid fa-chart-line text-white text-3xl"></i></div>
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase italic text-blue-400">TÂN MAI <span class="text-white">DIGITAL IOC</span></h1>
                <p id="live-clock" class="text-[10px] font-bold text-slate-500 tracking-[0.2em] uppercase mt-1"></p>
            </div>
        </header>

        <!-- BẢNG GIÁM SÁT CẬP NHẬT DỮ LIỆU CÁN BỘ -->
        <div class="lg:col-span-8 glass-card p-5">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black uppercase text-slate-400 italic flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Theo dõi cập nhật gần nhất của cán bộ
                </span>
                <button onclick="fetchData()" class="text-blue-500 hover:text-white transition-all"><i class="fa-solid fa-sync text-sm"></i></button>
            </div>
            <div id="update-monitor" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                <!-- Nội dung cập nhật tự động -->
            </div>
        </div>
    </div>

    <!-- Hệ thống Bộ lọc Đa năng -->
    <div class="max-w-[1750px] mx-auto glass-card p-4 mb-8 flex flex-wrap items-center gap-4 justify-center shadow-2xl">
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-blue-500 uppercase ml-2 mb-1">Theo Phòng</span>
            <select id="filter-dept" onchange="resetQuickFilter(); applyFilters();" class="text-sm font-bold w-44"><option value="all">Tất cả Phòng</option></select>
        </div>
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-1">Theo Cán bộ</span>
            <select id="filter-staff" onchange="resetQuickFilter(); applyFilters();" class="text-sm font-bold w-44"><option value="all">Tất cả cán bộ</option></select>
        </div>
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-1">Thời gian</span>
            <select id="filter-time" onchange="applyFilters()" class="text-sm font-bold w-40">
                <option value="all" selected>Toàn thời gian</option>
                <option value="month">Tháng này</option>
            </select>
        </div>
        <div class="flex flex-col">
            <span class="text-[9px] font-black text-slate-500 uppercase ml-2 mb-1">Tìm kiếm</span>
            <input type="text" id="search-box" onkeyup="applyFilters()" placeholder="Tên, mã, nội dung..." class="w-64 text-sm font-medium">
        </div>
    </div>

    <!-- Stat Cards (Click để lọc nhanh trạng thái) -->
    <div class="max-w-[1750px] mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6 mb-10 text-center text-white">
        <div onclick="setQuickFilter('all')" id="card-all" class="stat-card glass-card p-6 border-b-blue-500 active">
            <p id="stat-title" class="text-slate-400 text-[10px] font-black uppercase italic">Toàn Phường Tiếp Nhận</p>
            <h2 id="st-tong" class="text-5xl font-black mt-2 italic tracking-tighter">0</h2>
        </div>
        <div onclick="setQuickFilter('done')" id="card-done" class="stat-card glass-card p-6 border-b-emerald-500">
            <p class="text-emerald-500 text-[10px] font-black uppercase">Đã hoàn thành</p>
            <h2 id="st-xong" class="text-5xl font-black mt-2 italic tracking-tighter text-emerald-400">0</h2>
        </div>
        <div onclick="setQuickFilter('processing')" id="card-processing" class="stat-card glass-card p-6 border-b-amber-500">
            <p class="text-amber-500 text-[10px] font-black uppercase">Đang thụ lý</p>
            <h2 id="st-dang" class="text-5xl font-black mt-2 italic tracking-tighter text-amber-400">0</h2>
        </div>
        <div onclick="setQuickFilter('upcoming')" id="card-upcoming" class="stat-card glass-card p-6 border-b-indigo-500">
            <p class="text-indigo-400 text-[10px] font-black uppercase">Sắp đến hạn</p>
            <h2 id="st-sap" class="text-5xl font-black mt-2 italic tracking-tighter text-indigo-400">0</h2>
        </div>
        <div onclick="setQuickFilter('late')" id="card-late" class="stat-card glass-card p-6 border-b-rose-500">
            <p class="text-rose-500 text-[10px] font-black uppercase animate-pulse">Chậm muộn</p>
            <h2 id="st-tre" class="text-5xl font-black mt-2 italic tracking-tighter text-rose-400">0</h2>
        </div>
    </div>

    <!-- Table -->
    <div class="max-w-[1750px] mx-auto glass-card overflow-hidden shadow-2xl">
        <div class="px-8 py-5 border-b border-white/5 flex justify-between items-center bg-slate-900/40">
            <h3 class="font-black text-slate-300 uppercase italic text-sm tracking-widest flex items-center gap-2">
                <span class="w-1.5 h-5 bg-blue-500 rounded-full"></span> Nhật ký điều hành hồ sơ chi tiết
            </h3>
            <span id="result-count" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black">0 HỒ SƠ</span>
        </div>
        <div class="overflow-auto max-h-[600px]">
            <table class="w-full text-left">
                <thead>
                    <tr>
                        <th class="px-8">Mã hồ sơ</th>
                        <th class="px-8 w-1/4">Nội dung</th>
                        <th class="px-8">Phòng</th>
                        <th class="px-8">Cán bộ phụ trách</th>
                        <th class="px-8">Hạn trả</th>
                        <th class="px-8 text-center">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="main-table" class="divide-y divide-white/5 text-sm font-medium"></tbody>
            </table>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT4nKahZSB2c_xG2Te2nixkVdtedCohaJ-X5fA21FB9sf8DQI_vEjcg9K0f0xMWI4OB9Gq1ezLD_l4N/pub?gid=1707807946&single=true&output=csv';

        let originalData = [];
        let quickFilter = 'all';

        function parseCSV(text) {
            const result = [];
            let row = [], cell = "", inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let char = text[i], nxt = text[i+1];
                if (char === '"' && inQuotes && nxt === '"') { cell += '"'; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { row.push(cell); cell = ""; }
                else if ((char === '\r' || char === '\n') && !inQuotes) {
                    if (cell !== "" || row.length > 0) { row.push(cell); result.push(row); }
                    row = []; cell = ""; if (char === '\r' && nxt === '\n') i++;
                } else cell += char;
            }
            if (cell !== "" || row.length > 0) { row.push(cell); result.push(row); }
            return result;
        }

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const allRows = parseCSV(text);
                const now = new Date();
                
                originalData = allRows.filter(r => r[1] && r[1].includes('H41.')).map(r => {
                    const statusRaw = r[8] ? r[8].trim() : "Đang xử lý";
                    const deadline = parseDate(r[6]);
                    let computed = "processing";
                    if (statusRaw.toLowerCase().includes("hoàn thành") || statusRaw.toLowerCase().includes("kết quả")) computed = "done";
                    else if (deadline && deadline < now) computed = "late";
                    else if (deadline && (deadline-now)/(1000*60*60*24) <= 2) computed = "upcoming";

                    return {
                        id: r[1].trim(), content: r[2] || "Trống", staff: r[4] || "Chưa rõ",
                        receiveDate: parseDate(r[5]), deadline: deadline, dept: r[7] || "VPĐ",
                        statusText: statusRaw, computedStatus: computed,
                        lastUpdateStr: r[5] // Tạm thời dùng ngày nhận hồ sơ mới nhất làm mốc cập nhật
                    };
                });
                populateFilters();
                updateMonitor();
                applyFilters();
            } catch (err) { console.error(err); }
        }

        function updateMonitor() {
            const container = document.getElementById('update-monitor');
            const staffs = [...new Set(originalData.map(d => d.staff))].filter(Boolean);
            
            container.innerHTML = staffs.map(name => {
                const personData = originalData.filter(d => d.staff === name);
                // Tìm ngày hồ sơ mới nhất trong danh sách của người đó
                const lastDate = personData[0].lastUpdateStr; 
                return `<div class="bg-white/5 p-2 px-3 rounded-xl border border-white/5">
                    <p class="text-[8px] font-black uppercase text-slate-500 truncate">${name}</p>
                    <p class="text-[10px] font-bold text-blue-400 mt-1 italic">${lastDate}</p>
                </div>`;
            }).join('');
        }

        function parseDate(str) {
            if (!str || str.trim() === "") return null;
            const p = str.split('/');
            return p.length === 3 ? new Date(p[2].trim(), p[1]-1, p[0].trim()) : null;
        }

        function populateFilters() {
            const staffs = [...new Set(originalData.map(d => d.staff))].filter(Boolean);
            const depts = [...new Set(originalData.map(d => d.dept))].filter(Boolean);
            
            const sSelect = document.getElementById('filter-staff');
            const sCurrent = sSelect.value;
            sSelect.innerHTML = '<option value="all">Tất cả cán bộ</option>';
            staffs.forEach(s => sSelect.innerHTML += `<option value="${s}" ${s===sCurrent?'selected':''}>${s}</option>`);

            const dSelect = document.getElementById('filter-dept');
            const dCurrent = dSelect.value;
            dSelect.innerHTML = '<option value="all">Tất cả các Phòng</option>';
            depts.forEach(d => dSelect.innerHTML += `<option value="${d}" ${d===dCurrent?'selected':''}>${d}</option>`);
        }

        function setQuickFilter(type) {
            quickFilter = type;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-' + type).classList.add('active');
            applyFilters();
        }

        function resetQuickFilter() {
            quickFilter = 'all';
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
            document.getElementById('card-all').classList.add('active');
        }

        function applyFilters() {
            const dept = document.getElementById('filter-dept').value;
            const staff = document.getElementById('filter-staff').value;
            const time = document.getElementById('filter-time').value;
            const search = document.getElementById('search-box').value.toLowerCase().trim();
            const now = new Date();

            const baseFiltered = originalData.filter(d => {
                const matchDept = dept === 'all' || d.dept === dept;
                const matchStaff = staff === 'all' || d.staff === staff;
                const matchSearch = search === '' || d.id.toLowerCase().includes(search) || d.content.toLowerCase().includes(search);
                let matchTime = true;
                if(d.receiveDate && time !== 'all') {
                    if(time === 'month') matchTime = d.receiveDate.getMonth() === now.getMonth() && d.receiveDate.getFullYear() === now.getFullYear();
                }
                return matchDept && matchStaff && matchSearch && matchTime;
            });

            let titlePrefix = "Toàn Phường";
            if (dept !== 'all') titlePrefix = "Phòng: " + dept.toUpperCase();
            if (staff !== 'all') titlePrefix = "CB: " + staff.toUpperCase();
            
            document.getElementById('stat-title').innerText = titlePrefix;
            document.getElementById('st-tong').innerText = baseFiltered.length;
            document.getElementById('st-xong').innerText = baseFiltered.filter(i => i.computedStatus === 'done').length;
            document.getElementById('st-dang').innerText = baseFiltered.filter(i => i.computedStatus === 'processing').length;
            document.getElementById('st-tre').innerText = baseFiltered.filter(i => i.computedStatus === 'late').length;
            document.getElementById('st-sap').innerText = baseFiltered.filter(i => i.computedStatus === 'upcoming').length;

            const finalData = baseFiltered.filter(d => quickFilter === 'all' || d.computedStatus === quickFilter);
            renderTable(finalData);
        }

        function renderTable(data) {
            document.getElementById('main-table').innerHTML = data.map(d => {
                let cls = "bg-blue-500/10 text-blue-400 border-blue-500/20";
                let label = d.statusText;
                if(d.computedStatus === 'done') cls = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                else if(d.computedStatus === 'late') { cls = "bg-rose-500/10 text-rose-400 border-rose-500/20 animate-pulse"; label = "Chậm muộn"; }
                else if(d.computedStatus === 'upcoming') { cls = "bg-indigo-500/10 text-indigo-400 border-indigo-500/20"; label = "Sắp đến hạn"; }

                return `<tr>
                    <td class="px-8 py-5 font-mono text-[11px] text-blue-400 font-black">${d.id}</td>
                    <td class="px-8 py-5 text-slate-300 font-bold leading-relaxed"><div class="text-content">${d.content}</div></td>
                    <td class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-tighter">${d.dept}</td>
                    <td class="px-8 py-5 text-[10px] font-black uppercase text-slate-500 italic">${d.staff}</td>
                    <td class="px-8 py-5 text-xs text-slate-500 font-bold italic">${d.deadline ? d.deadline.toLocaleDateString('vi-VN') : '--'}</td>
                    <td class="px-8 py-5 text-center"><span class="status-pill border ${cls}">${label}</span></td>
                </tr>`;
            }).join('');
            document.getElementById('result-count').innerText = `${data.length} HỒ SƠ`;
        }

        setInterval(() => document.getElementById('live-clock').innerText = new Date().toLocaleString('vi-VN'), 1000);
        fetchData();
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
